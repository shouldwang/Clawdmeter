[env:waveshare_amoled_216]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
board_build.arduino.memory_type = qio_opi
; Without this, pio defaults to building a LittleFS image for `uploadfs`
; even though the partition CSV labels it "spiffs" — that label is just a
; name, not the actual on-flash format. memefs.cpp mounts via Arduino's
; SPIFFS.h, so the built image must match (see docs/plans/usb-transport-lightbox.md Phase 4).
board_build.filesystem = spiffs
upload_speed = 921600
monitor_speed = 115200
; With ARDUINO_USB_MODE=0 (TinyUSB OTG, needed for USB HID) the chip can no
; longer be rebooted into download mode by hardware — the running firmware
; must do it. esptool's classic DTR/RTS dance needs a 4-step line-state
; sequence (USBCDC.cpp _onLineState) that macOS's CDC driver delivers
; unreliably, so plugged-in flashing randomly failed. The 1200bps touch is a
; single robust signal the core also honors (_onLineCoding → bootloader).
; The port re-enumerates as the ROM's USB-JTAG/serial device, hence the wait.
board_upload.use_1200bps_touch = yes
board_upload.wait_for_upload_port = yes

; Compile shared code + this board's per-board folder; exclude all other
; boards. New ports add a `+<boards/<name>/>` line in their own env block.
build_src_filter =
    +<*>
    -<boards/>
    +<boards/waveshare_amoled_216/>

build_flags =
    -DBOARD_AMOLED_216
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; TinyUSB OTG mode — required for USB HID (Keyboard). Native USB, not a
    ; UART bridge; see BOARD_HAS_USB_HID in board.h.
    -DARDUINO_USB_MODE=0
    -DBOARD_HAS_PSRAM
    ; AXP2101 PMU
    -DXPOWERS_CHIP_AXP2101
    ; LVGL config via build flags
    -DLV_CONF_SKIP
    -DLV_COLOR_DEPTH=16
    -DLV_USE_LOG=0
    -DLV_USE_BAR=1
    -DLV_USE_LABEL=1
    -DLV_USE_ARC=1
    -DLV_USE_BTN=1
    -DLV_USE_LINE=1
    -DLV_USE_OBJ=1
    -DLV_USE_IMG=1
    -DLV_USE_IMAGE=1
    -DLV_USE_ANIMIMG=0
    -DLV_TICK_CUSTOM=1
    -DLV_USE_SNAPSHOT=1
    ; Lightbox screen (docs/plans/usb-transport-lightbox.md Phase 4) — memes
    ; are read from the SPIFFS partition via memefs.cpp, PNG via LVGL's
    ; bundled lodepng decoder, GIF via LVGL's bundled gif widget.
    -DLV_USE_LODEPNG=1
    -DLV_USE_GIF=1
    ; Decode buffers must not come from LVGL's builtin 64 KB pool (the
    ; LV_CONF_SKIP default): a 480x480 RGBA PNG decodes to ~900 KB, so
    ; allocation fails silently and the lightbox renders black. CLIB mode
    ; routes lv_malloc → system malloc; the Arduino core sends >4 KB
    ; allocations to PSRAM (CONFIG_SPIRAM_USE_MALLOC=1, ALWAYSINTERNAL=4096).
    -DLV_USE_STDLIB_MALLOC=LV_STDLIB_CLIB
    ; Image cache is off by default, so every redraw re-decodes the PNG from
    ; SPIFFS (~900 KB inflate each time). 2 MB keeps two decoded 480x480
    ; frames resident in PSRAM; GIF playback has its own canvas and doesn't
    ; go through this cache.
    -DLV_CACHE_DEF_SIZE=2097152

lib_deps =
    moononournation/GFX Library for Arduino@^1.5.6
    lewisxhe/SensorLib@^0.2.6
    lewisxhe/XPowersLib@^0.2.7
    lvgl/lvgl@^9.2.0
    bblanchon/ArduinoJson@^7.0.0


[env:waveshare_amoled_18]
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip
board = esp32-s3-devkitc-1
framework = arduino
board_build.arduino.memory_type = qio_opi
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.partitions = default_16MB.csv
upload_speed = 921600
monitor_speed = 115200
; Same TinyUSB-OTG flashing fix as waveshare_amoled_216 (see that env's
; comment): ARDUINO_USB_MODE=0 makes the DTR/RTS reset flaky on macOS, the
; 1200bps touch is the reliable path. Verified on the 2.16; this board uses
; the identical USB stack but hasn't been hardware-tested with these flags.
board_upload.use_1200bps_touch = yes
board_upload.wait_for_upload_port = yes

; Compile shared code + this board's per-board folder; exclude all other
; boards. New ports add a `+<boards/<name>/>` line in their own env block.
build_src_filter =
    +<*>
    -<boards/>
    +<boards/waveshare_amoled_18/>

build_flags =
    -DBOARD_AMOLED_18
    -DARDUINO_USB_CDC_ON_BOOT=1
    ; TinyUSB OTG mode — required for USB HID (Keyboard). Native USB, not a
    ; UART bridge; see BOARD_HAS_USB_HID in board.h.
    -DARDUINO_USB_MODE=0
    -DBOARD_HAS_PSRAM
    ; AXP2101 PMU is present on the AMOLED-1.8 board too (battery is optional kit add-on)
    -DXPOWERS_CHIP_AXP2101
    ; LVGL config via build flags
    -DLV_CONF_SKIP
    -DLV_COLOR_DEPTH=16
    -DLV_USE_LOG=0
    -DLV_USE_BAR=1
    -DLV_USE_LABEL=1
    -DLV_USE_ARC=1
    -DLV_USE_BTN=1
    -DLV_USE_LINE=1
    -DLV_USE_OBJ=1
    -DLV_USE_IMG=1
    -DLV_USE_IMAGE=1
    -DLV_USE_ANIMIMG=0
    -DLV_TICK_CUSTOM=1
    -DLV_USE_SNAPSHOT=1

lib_deps =
    ; 1.6.4+ ships Arduino_SH8601 in mainline
    moononournation/GFX Library for Arduino@^1.6.4
    ; SensorLib still used for QMI8658 IMU on AMOLED-1.8
    lewisxhe/SensorLib@^0.2.6
    lewisxhe/XPowersLib@^0.2.7
    lvgl/lvgl@^9.2.0
    bblanchon/ArduinoJson@^7.0.0


[env:waveshare_amoled_216_c6]
; C6 sibling of the AMOLED-2.16. Same panel/touch/PMU/IMU, no PSRAM,
; single-core RISC-V, BLE 5.3 only (no classic BT). If the build fails
; resolving the C6 board, bump pioarduino to a newer 55.x release that
; ships esp32-c6-devkitc-1.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip
board = esp32-c6-devkitc-1
framework = arduino
upload_speed = 921600
monitor_speed = 115200
; Waveshare's C6-AMOLED-2.16 ships with 16 MB flash. The default 1.25 MB
; app partition can't hold this firmware (~1.43 MB) — switch to the
; 16 MB layout that gives the app ~6.5 MB, matching the AMOLED-1.8 env.
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.partitions = default_16MB.csv

build_src_filter =
    +<*>
    -<boards/>
    +<boards/waveshare_amoled_216_c6/>

build_flags =
    -DBOARD_AMOLED_216_C6
    ; C6 has only USB-Serial-JTAG (HWCDC), no native USB-OTG. The Arduino
    ; core maps Serial → HWCDCSerial only when BOTH flags below are set;
    ; CDC_ON_BOOT alone selects USBSerial (TinyUSB) which doesn't exist on
    ; C6 and breaks the build. Without either flag, Serial routes to UART0
    ; on physical pins and nothing reaches the USB host.
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    ; No -DBOARD_HAS_PSRAM — C6 has no external PSRAM. Shared code
    ; (main.cpp, splash.cpp) gates on this to pick MALLOC_CAP_INTERNAL
    ; and shrink LVGL buffers + splash canvas accordingly.
    -DXPOWERS_CHIP_AXP2101
    -DLV_CONF_SKIP
    -DLV_COLOR_DEPTH=16
    -DLV_USE_LOG=0
    -DLV_USE_BAR=1
    -DLV_USE_LABEL=1
    -DLV_USE_ARC=1
    -DLV_USE_BTN=1
    -DLV_USE_LINE=1
    -DLV_USE_OBJ=1
    -DLV_USE_IMG=1
    -DLV_USE_IMAGE=1
    -DLV_USE_ANIMIMG=0
    -DLV_TICK_CUSTOM=1
    ; Screenshot capture needs a full-frame RGB565 buffer (~460 KB on
    ; 480×480) which doesn't fit in C6 internal SRAM. send_screenshot
    ; prints SCREENSHOT_UNSUPPORTED on this board.
    -DLV_USE_SNAPSHOT=0

lib_deps =
    ; this board uses the CO5300 (same controller as the S3 2.16); Arduino_CO5300
    moononournation/GFX Library for Arduino@^1.6.4
    lewisxhe/SensorLib@^0.2.6
    lewisxhe/XPowersLib@^0.2.7
    lvgl/lvgl@^9.2.0
    bblanchon/ArduinoJson@^7.0.0


[env:waveshare_amoled_18_c6]
; C6 sibling of the AMOLED-1.8. Same 368x448 SH8601 panel + FT3168 touch as
; the S3 1.8, but on the C6 SoC: no PSRAM, single-core RISC-V, BLE 5 only.
; Display/touch power is gated by a TCA9554 IO expander (P4/P5); PWR button
; is the AXP2101 PKEY. If the build fails resolving the C6 board, bump
; pioarduino to a newer 55.x release that ships esp32-c6-devkitc-1.
platform = https://github.com/pioarduino/platform-espressif32/releases/download/55.03.38-1/platform-espressif32.zip
board = esp32-c6-devkitc-1
framework = arduino
upload_speed = 921600
monitor_speed = 115200
; Waveshare's C6-AMOLED-1.8 ships with 16 MB flash. The default 1.25 MB app
; partition can't hold this firmware — switch to the 16 MB layout that gives
; the app ~6.5 MB, matching the other 16 MB envs.
board_upload.flash_size = 16MB
board_upload.maximum_size = 16777216
board_build.partitions = default_16MB.csv

build_src_filter =
    +<*>
    -<boards/>
    +<boards/waveshare_amoled_18_c6/>

build_flags =
    -DBOARD_AMOLED_18_C6
    ; C6 has only USB-Serial-JTAG (HWCDC), no native USB-OTG. The Arduino
    ; core maps Serial → HWCDCSerial only when BOTH flags below are set;
    ; CDC_ON_BOOT alone selects USBSerial (TinyUSB) which doesn't exist on
    ; C6 and breaks the build.
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=1
    ; No -DBOARD_HAS_PSRAM — C6 has no external PSRAM. Shared code
    ; (main.cpp, splash.cpp) gates on this to pick MALLOC_CAP_INTERNAL
    ; and shrink LVGL buffers + splash canvas accordingly.
    -DXPOWERS_CHIP_AXP2101
    -DLV_CONF_SKIP
    -DLV_COLOR_DEPTH=16
    -DLV_USE_LOG=0
    -DLV_USE_BAR=1
    -DLV_USE_LABEL=1
    -DLV_USE_ARC=1
    -DLV_USE_BTN=1
    -DLV_USE_LINE=1
    -DLV_USE_OBJ=1
    -DLV_USE_IMG=1
    -DLV_USE_IMAGE=1
    -DLV_USE_ANIMIMG=0
    -DLV_TICK_CUSTOM=1
    ; Screenshot capture needs a full-frame RGB565 buffer that doesn't fit in
    ; C6 internal SRAM. send_screenshot prints SCREENSHOT_UNSUPPORTED instead.
    -DLV_USE_SNAPSHOT=0

lib_deps =
    ; 1.6.4+ required for Arduino_SH8601
    moononournation/GFX Library for Arduino@^1.6.4
    lewisxhe/SensorLib@^0.2.6
    lewisxhe/XPowersLib@^0.2.7
    lvgl/lvgl@^9.2.0
    bblanchon/ArduinoJson@^7.0.0
